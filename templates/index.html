<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPredict IA - Estimation de prix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Conservation de ton style original */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        :root {
            --rouge: #ff4d4d;
            --rouge-fonce: #cc0000;
            --bleu: #4d79ff;
            --bleu-fonce: #2b4db3;
            --gradient-principal: linear-gradient(135deg, var(--rouge), var(--bleu));
            --ombre: 0 10px 30px rgba(0, 0, 0, 0.15);
            --blanc: #ffffff;
            --gris-clair: #f8f9fa;
            --gris: #6c757d;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f5 0%, #f0f5ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            z-index: 10;
        }

        .form-card, .results-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px;
            box-shadow: var(--ombre);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header-gradient {
            background: var(--gradient-principal);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: var(--gris);
            margin-bottom: 25px;
            font-size: 0.9rem;
            border-left: 4px solid var(--rouge);
            padding-left: 15px;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #333; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 15px; color: var(--gris); }
        
        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .input-wrapper input:focus { border-color: var(--rouge); outline: none; }

        .btn-predict {
            width: 100%;
            padding: 15px;
            background: var(--gradient-principal);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-predict:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 77, 77, 0.3); }

        /* Résultats */
        .price-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .price-card { background: var(--gris-clair); padding: 15px; border-radius: 15px; text-align: center; border-top: 4px solid var(--rouge); }
        .price-card h4 { font-size: 0.8rem; color: var(--gris); }
        .price-card .price { font-size: 1.1rem; font-weight: 700; margin-top: 5px; }

        .chart-container { height: 200px; margin-top: 20px; }

        .loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .loader.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--rouge); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Analyse des données...</p>
    </div>

    <div class="container">
        <div class="form-card">
            <div class="header-gradient">
                <i class="fas fa-microchip"></i>
                <span>AutoPredict IA</span>
            </div>
            <div class="subtitle">Analyse prédictive basée sur le dataset car_data</div>

            <div class="input-group">
                <label>Nom du véhicule</label>
                <div class="input-wrapper">
                    <i class="fas fa-car input-icon"></i>
                    <input type="text" id="car_name" placeholder="Ex: Swift, Ciaz, City..." value="City">
                </div>
            </div>

            <div class="input-group">
                <label>Année (Year)</label>
                <div class="input-wrapper">
                    <i class="fas fa-calendar-alt input-icon"></i>
                    <input type="number" id="year" value="2015">
                </div>
            </div>

            <div class="input-group">
                <label>Kilométrage (Driven_kms)</label>
                <div class="input-wrapper">
                    <i class="fas fa-road input-icon"></i>
                    <input type="number" id="kms" value="45000">
                </div>
            </div>

            <div class="input-group">
                <label>Carburant (Fuel_Type)</label>
                <div class="input-wrapper">
                    <i class="fas fa-gas-pump input-icon"></i>
                    <select id="fuel">
                        <option value="Petrol">Petrol (Essence)</option>
                        <option value="Diesel">Diesel</option>
                        <option value="CNG">CNG (Gaz)</option>
                    </select>
                </div>
            </div>

            <button class="btn-predict" onclick="predict()">
                <i class="fas fa-magic"></i> Prédire les prix
            </button>
        </div>

        <div class="results-card" id="resultsCard" style="display: none;">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                <div style="width: 50px; height: 50px; background: var(--gradient-principal); border-radius: 12px; display: flex; justify-content: center; align-items: center; color: white; font-size: 1.5rem;">
                    <i class="fas fa-chart-bar"></i>
                </div>
                <div>
                    <h3 id="display_name" style="font-size: 1.4rem;">Résultats</h3>
                    <p style="font-size: 0.8rem; color: var(--gris);">Estimation IA en FCFA</p>
                </div>
            </div>

            <div class="price-cards">
                <div class="price-card">
                    <h4>Passé (2023)</h4>
                    <div class="price" id="past_p">--</div>
                </div>
                <div class="price-card" style="border-top-color: var(--bleu);">
                    <h4>Présent (2026)</h4>
                    <div class="price" id="present_p">--</div>
                </div>
                <div class="price-card" style="border-top-color: #2ecc71;">
                    <h4>Futur (2029)</h4>
                    <div class="price" id="future_p">--</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chart = null;

        async function predict() {
            document.getElementById('loader').classList.add('active');
            
            // Collecte des données
            const name = document.getElementById('car_name').value;
            const year = parseInt(document.getElementById('year').value);
            const kms = parseInt(document.getElementById('kms').value);
            const fuel = document.getElementById('fuel').value;

            // Appel au serveur Flask
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, year, kms, fuel })
                });
                
                const data = await response.json();

                // Mise à jour de l'interface
                document.getElementById('display_name').innerText = data.name;
                document.getElementById('past_p').innerText = data.results.passe;
                document.getElementById('present_p').innerText = data.results.present;
                document.getElementById('future_p').innerText = data.results.futur;

                updateChart(data.results);
                document.getElementById('resultsCard').style.display = 'block';
            } catch (error) {
                alert("Erreur de connexion avec le serveur IA");
            }

            document.getElementById('loader').classList.remove('active');
        }

        function updateChart(results) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const cleanPrice = (p) => parseInt(p.replace(/\s/g, '').replace('FCFA', ''));
            
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['2023', '2026', '2029'],
                    datasets: [{
                        label: 'Évolution estimée',
                        data: [cleanPrice(results.passe), cleanPrice(results.present), cleanPrice(results.futur)],
                        borderColor: '#ff4d4d',
                        backgroundColor: 'rgba(255, 77, 77, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
